# secrets.yaml
# 包含敏感信息（API密钥等）的配置文件
# 此文件不应提交到版本控制

# 示例：AKShare配置（如需）
# ak_api_key: "your_api_key_here"

# 示例：yfinance配置
# yf_proxy: "your_proxy_here"

# 实盘交易相关配置（仅当mode为live或paper时启用）
live_trading:
  # 券商接口配置
  broker:
    type: "none"  # 可选: "simulation", "paper", "live"
    # API密钥和账户信息
    api_key: ""
    secret_key: ""
    account_id: ""
  
  # 风险管理
  risk_limits:
    max_position_size: 0.2  # 单个资产最大仓位比例
    max_daily_loss: -0.05   # 最大日亏损比例
    max_total_exposure: 1.0 # 总敞口上限
  
  # 订单执行
  execution:
    slippage_model: "fixed"  # 滑点模型
    slippage_bps: 2          # 2个基点
  
# 数据源备用配置
data_sources:
  yfinance:
    timeout: 30
    retry_times: 3
  
  akshare:
    timeout: 60
    retry_times: 5

# 汇率获取备用配置
currency:
  primary_source: "yfinance"
  fallback_source: "manual"
  manual_rates:
    USDCNY: 7.2
    CNYUSD: 0.1389

# 日志配置
logging:
  level: "INFO"
  file: "logs/fm.log"
  max_size_mb: 100
  backup_count: 5