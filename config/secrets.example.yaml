# secrets.example.yaml
# Copy this file to config/secrets.yaml for local use.
# Do not commit real API keys, broker credentials, account IDs, or personal settings.

live_trading:
  broker:
    type: "none"
    api_key: ""
    secret_key: ""
    account_id: ""

  risk_limits:
    max_position_size: 0.2
    max_daily_loss: -0.05
    max_total_exposure: 1.0

  execution:
    slippage_model: "fixed"
    slippage_bps: 2

data_sources:
  yfinance:
    timeout: 30
    retry_times: 3

  akshare:
    timeout: 60
    retry_times: 5

currency:
  primary_source: "manual"
  fallback_source: "manual"
  manual_rates:
    USDCNY: 7.2
    CNYUSD: 0.1389
    EURUSD: 1.1
    USDEUR: 0.9091

logging:
  level: "INFO"
  file: "logs/optifolio.log"
  max_size_mb: 100
  backup_count: 5
