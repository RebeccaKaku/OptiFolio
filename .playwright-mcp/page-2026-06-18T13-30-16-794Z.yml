                  - generic [ref=e309]: "# 🧪 Testing Improvement Task You are a testing-focused agent. Your mission is to analyze and implement a testing improvement that will increase the reliability and coverage of the codebase. ## Task Details **File:** `FinData/serving/provider.py:1` **Issue:** Missing edge case tests for panel data method **Language:** python **Current Code:** ```python def panel(self, symbols: List[str], start: str = None, end: str = None, mode: str = \"fast\") -> Optional[pd.DataFrame]: \"\"\"Aligned prices for multiple assets.\"\"\" if mode == \"live\": self._trigger_refresh(symbols) return self._store.get_prices(symbols, start=start, end=end) ``` **Rationale:** Creating tests for empty inputs or partial failures is straightforward once the basic mocking for the provider is established. ## Your Process ### 1. 🔍 UNDERSTAND - Analyze the Testing Gap * Review the code that needs testing * Understand what functionality should be tested * Identify edge cases and error conditions ### 2. 📋 PLAN - Design the Test Strategy Before writing tests, plan your approach: * What test framework is used in this project? * What existing test patterns should you follow? * What scenarios need to be covered? ### 3. 🔧 IMPLEMENT - Write Effective Tests * Write clear, focused test cases * Follow existing testing patterns and conventions * Cover happy paths, edge cases, and error conditions * Use appropriate mocks and test doubles * Ensure tests are deterministic and not flaky ### 4. ✅ VERIFY - Validate the Tests - Run the new tests to ensure they pass - Run the full test suite to ensure no regressions - Verify the tests actually catch bugs (try breaking the code to confirm the test fails) ### 5. 📝 DOCUMENT - Explain the Testing Improvement Create a PR with: - Title: \"🧪 [testing improvement description]\" - Description with: * 🎯 **What:** The testing gap addressed * 📊 **Coverage:** What scenarios are now tested * ✨ **Result:** The improvement in test coverage Remember: Good tests are the safety net that allows confident refactoring. Write tests that catch real bugs."
