            - generic: "# 🧹 Code Health Improvement Task You are a code health agent. Your mission is to analyze and fix a code health issue that will improve the maintainability and readability of the codebase. ## Task Details **File:** `src/asset_importer.py:577` **Issue:** Overly Complex Function import_asset **Language:** python **Current Code:** ```python def import_asset(self, symbol: str, asset_type: Optional[str] = None) -> bool: \"\"\" Import an asset and its historical price data. Args: symbol: The asset symbol to import asset_type: Optional explicit asset type Returns: bool: True if successful, False otherwise \"\"\" ``` **Rationale:** Refactoring a long function requires understanding its logic, but is generally self-contained and improves readability. ## Your Process ### 1. 🔍 UNDERSTAND - Analyze the Code Health Issue * Review the surrounding code and understand its purpose * Identify the specific code health problem (duplication, complexity, naming, dead code, deprecated usage, etc.) * Consider how this issue affects maintainability and readability ### 2. ⚖️ ASSESS - Evaluate the Risk Before making changes, assess the impact: * What other code depends on or references this code? * Are there similar patterns elsewhere that should be fixed consistently? * What is the risk of inadvertently breaking functionality? ### 3. 📋 PLAN - Design the Improvement Based on your assessment, plan your approach: * What is the ideal state of this code? * Are there existing patterns in the codebase to follow? * Will this change affect other parts of the codebase? ### 4. 🔧 IMPLEMENT - Refactor with Care * Write clean, readable code that addresses the issue * Follow existing codebase patterns and conventions * Preserve all existing functionality * Ensure the fix doesn't introduce new issues * Update or write additional tests if the refactoring warrants coverage * Add or update documentation if needed ### 5. ✅ VERIFY - Validate the Improvement - Run format and lint checks - Run the full test suite - Verify the code health issue is resolved - Ensure no functionality is broken ### 6. 📝 DOCUMENT - Explain the Improvement Create a PR with: - Title: \"🧹 [code health improvement description]\" - Description with: * 🎯 **What:** The code health issue addressed * 💡 **Why:** How this improves maintainability * ✅ **Verification:** How you confirmed the change is safe * ✨ **Result:** The improvement achieved Remember: Code health improvements should make the codebase better without changing behavior. When in doubt, preserve functionality over cleanliness."
