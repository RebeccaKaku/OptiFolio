              - text: 持仓风险：
              - text: 本结构性存款产品有投资风险，只保障产品认购资金和本产品说明书明确承诺的保底收益率，不保证高于保底收益率的产品收益，客户应充分认识投资风险，谨慎投资。
              - text: （一）市场风险：受各种市场因素、宏观政策因素等的影响，挂钩指标价格变化将可能影响客户无法获得高于保底收益率的产品收益。
              - text: （二）流动性风险：除非产品说明书有特殊约定，结构性存款产品不提供到期日之前的赎回机制。客户须持有产品到期，客户面临产品存续期不能提前支取的流动性风险。
              - text: （三）信用风险：中国银行发生信用风险如被依法撤销或被申请破产等，将对本结构性存款产品的认购资金及收益产生影响。
              - text: （四）提前终止风险：本结构性存款产品存续期内，如遇法律法规、监管规定出现重大变更，要求本产品终止，本结构性存款产品可能提前终止。
              - text: （五）政策风险：本结构性存款产品是根据当前的相关法规和政策设计的，如果国家宏观政策以及相关法规政策发生变化，可能影响本结构性存款产品的正常运行。
              - text: （六）其他风险：如自然灾害、战争等不可抗力因素造成的相关投资风险，由客户自行承担。
      - table [ref=e109]:
        - rowgroup [ref=e110]:
          - row "风险控制措施： 本行针对结构性存款业务的风险特征，制定和实施相应的风险管理政策和程序，持续有效地识别、计量、监测和控制结构性存款业务面临的各类风险，并将结构性存款业务风险管理纳入全面风险管理体系。本行将结构性存款纳入表内核算，按照存款管理，纳入存款准备金和存款保险保费的缴纳范围，相关资产按照国务院银行业监督管理机构的相关规定计提资本和拨备。 本行具备普通类衍生产品交易业务资格，结构性存款挂钩的衍生产品交易严格遵守《银行业金融机构衍生产品交易业务管理暂行办法》、《商业银行资本管理办法（试行）》、《商业银行杠杆率管理办法（修订）》、《商业银行流动性风险管理办法》等国务院银行业监督管理机构关于衍生产品交易的相关规定。 本行销售结构性存款，中国银保监会发布的《关于进一步规范商业银行结构性存款业务的通知》（银保监办发〔2019〕204号）相关规定执行，充分揭示风险，实施专区销售和录音录像。销售文本全面、客观反映结构性存款的重要特性和与产品有关的重要事实，向投资者充分揭示风险，确保投资者了解结构性存款的产品性质和潜在风险，自主进行投资决策。并按约定在中国银行官网及结构性存款信息查询平台向投资者披露产品销售文件、发行报告、产品账单、到期报告、重大事项报告、临时性信息披露等内容及国务院银行业监督管理机构规定的其他信息。" [ref=e111]:
