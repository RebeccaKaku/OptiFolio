            - cell "风险提示：结构性存款不同于一般性存款，具有投资风险，您应当充分认识投资风险，谨慎投资。" [ref=e104]
      - table [ref=e105]:
        - rowgroup [ref=e106]:
          - row "持仓风险： 本结构性存款产品有投资风险，只保障产品认购资金和本产品说明书明确承诺的保底收益率，不保证高于保底收益率的产品收益，客户应充分认识投资风险，谨慎投资。 （一）市场风险：受各种市场因素、宏观政策因素等的影响，挂钩指标价格变化将可能影响客户无法获得高于保底收益率的产品收益。 （二）流动性风险：除非产品说明书有特殊约定，结构性存款产品不提供到期日之前的赎回机制。客户须持有产品到期，客户面临产品存续期不能提前支取的流动性风险。 （三）信用风险：中国银行发生信用风险如被依法撤销或被申请破产等，将对本结构性存款产品的认购资金及收益产生影响。 （四）提前终止风险：本结构性存款产品存续期内，如遇法律法规、监管规定出现重大变更，要求本产品终止，本结构性存款产品可能提前终止。 （五）政策风险：本结构性存款产品是根据当前的相关法规和政策设计的，如果国家宏观政策以及相关法规政策发生变化，可能影响本结构性存款产品的正常运行。 （六）其他风险：如自然灾害、战争等不可抗力因素造成的相关投资风险，由客户自行承担。" [ref=e107]:
