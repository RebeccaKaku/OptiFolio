[project]
name = "findata"
version = "0.1.0"
description = "Local-first financial data layer — adapters, store, orchestration, serving"
requires-python = ">=3.14"
dependencies = ["optifolio-contracts"]

[project.optional-dependencies]
dev = ["pytest", "pandas-stubs", "duckdb", "pyarrow"]

[build-system]
requires = ["setuptools>=75"]
build-backend = "setuptools.build_meta"
